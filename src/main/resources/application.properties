spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/backlog?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
tmdb.api.key=${TMDB_API_KEY}
tmdb.api.url=https://api.themoviedb.org/3
sentry.dsn=${SENTRY_DSN}
sentry.traces-sample-rate=1.0
sentry.environment=development
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.minimum-idle=0
brevo.api.key=${BREVO_API_KEY}
spring.jpa.open-in-view=false
GEMINI_API_KEY=${GEMINI_API_KEY}
GROQ_API_KEY=${GROQ_API_KEY}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
igdb.client-id=${IGDB_CLIENT_ID}
igdb.auth-token=${IGDB_AUTH_TOKEN}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
