<!DOCTYPE html>
<html lang="pt-br"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
        <title>Meu Backlog</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script defer src="https://cloud.umami.is/script.js" data-website-id="7426b8b2-ca40-453e-8cfc-72364e92c02c"></script>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="stylesheet" th:href="@{/css/variaveis.css}">
    </head>

    <body>

        <header class="app-header">

            <div class="header-info">
                <h2>Meus Backlog 🎮</h2>
                <p class="user-greeting">
                    Olá,
                    <a th:href="@{/perfil}" class="link-perfil" title="Configurações do Perfil">
                        <span class="user-name" th:text="${nomeUsuario}">Carregando...</span>!
                        <span style="font-size: 1.1em; vertical-align: middle; margin-left: 5px;">⚙️</span>
                    </a>
                </p>
            </div>

            <div class="header-actions">

                <div class="search-social-container" id="container-busca-social">
                    <i class="fa-solid fa-magnifying-glass search-icon icone-pc"></i>
                    <input type="text" id="input-busca-social" placeholder="Buscar amigos (@)..." autocomplete="off">
                    
                    <button type="button" id="btn-fechar-busca" class="btn-fechar-busca" style="display: none;" title="Fechar busca">✖</button>
                    
                    <div id="dropdown-busca-social" class="dropdown-social" style="display: none;"></div>
                </div>

                <div class="toggles-group">
                    <button id="btn-mobile-busca" class="btn-theme btn-mobile-busca" title="Buscar Pessoas">
                        <span>🔍</span>
                    </button>

                    <button id="theme-toggle" class="btn-theme" title="Alternar Modo Escuro/Claro">
                        <span id="theme-icon">🌙</span>
                    </button>

                    <button id="rating-toggle" class="btn-theme" title="Alternar para Estrelas">
                        <span id="rating-icon">⭐</span>
                    </button>

                    <button id="btn-mobile-gaveta" class="btn-theme btn-mobile-gaveta" title="Mais Opções">
                        <span>⚙️</span>
                    </button>
                </div>

                <!-- Abstrai os botões para virarem a Bottom Sheet no celular -->
                <div id="gaveta-opcoes-mobile" class="gaveta-opcoes-wrapper">
                    <div class="gaveta-conteudo">
                        <div class="gaveta-barra-arrastar"></div>
                        
                        <a th:href="@{/meus-links}" class="btn-novo btn-share">
                            🔗 Compartilhar
                        </a>

                        <a th:href="@{/dashboard}" class="btn-novo" style="background-color: #f39c12;">
                            📊 Estatísticas
                        </a>

                        <a th:href="@{/cadastro}" class="btn-novo">
                            + Novo Item
                        </a>

                        <form th:action="@{/logout}" method="post" class="form-logout">
                            <button type="submit" class="btn-sair">
                                Sair 🚪
                            </button>
                        </form>
                    </div>
                    <!-- Fundo escurecido atrás da gaveta -->
                    <div id="gaveta-overlay" class="gaveta-overlay"></div>
                </div>
            </div>

        </header>

        <main>
            <div class="controls-wrapper">

                <button id="btn-filtros-toggle" class="btn-filtros-toggle">
                    <span>🔍 Filtros e Busca</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

                <div id="filter-menu" class="filter-menu">
                    <div class="filter-group">
                        <label>Tipo:</label>
                        <select id="filter-type">
                            <option value="todos">🌪️ Todos</option>
                            <option value="Jogo">🎮 Jogos</option>
                            <option value="Filme">🎬 Filmes</option>
                            <option value="Série">📺 Séries</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Status:</label>
                        <select id="filter-status" title="Filtrar por status">
                            <option value="todos">🌪️ Todos</option>
                            <option value="andamento">▶️ Jogando / Assistindo</option>
                            <option value="concluido">✅ Zerado / Assistido</option>
                            <option value="backlog">📅 Backlog</option>
                            <option value="dropado">❌ Dropado</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Ordem:</label>
                        <select id="filter-order">
                            <option value="padrao">🔃 Nome (A-Z)</option>
                            <option value="maior">⭐ Maior Nota</option>
                            <option value="menor">👎 Menor Nota</option>
                        </select>
                    </div>

                    <div class="search-container">
                        <input type="text" id="search-bar" placeholder="Pesquisar por nome...">
                    </div>

                    <button id="btn-limpar-filtros" class="btn-limpar">
                        🧹 Limpar Filtros
                    </button>
                </div>
            </div>

            <div id="msg-nao-encontrado" style="display: none; text-align: center; color: #7f8c8d; margin-top: 20px;">
                <p style="font-size: 2rem; margin: 0;">😕</p>
                <p>Nenhum item encontrado com esse nome.</p>
            </div>

            <div id="lista-itens">
                <p style="text-align: center; width: 100%; color: #aaa;">Carregando sua coleção...</p>
            </div>

            <button id="btn-topo" title="Voltar ao topo">⬆</button>
        </main>

        <footer th:fragment="footer" class="main-footer">
            <div class="footer-content">
                <p>&copy; 2026 <strong>Luiz Augusto</strong> | Meus Backlog</p>
                <nav class="footer-links">
                    <a th:href="@{/creditos}">Créditos</a>
                    <a href="https://github.com/augusto-projetos" target="_blank">GitHub</a>
                </nav>
            </div>
        </footer>

        <script th:src="@{/js/script.js}"></script>
        <script th:src="@{/js/search-scroll.js}"></script>
        <script th:src="@{/js/theme-toggle.js}"></script>
        <script th:src="@{/js/rating-toggle.js}"></script>
        <script th:src="@{/js/busca-social.js}"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </body>
</html>
