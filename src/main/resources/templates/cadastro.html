<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://cloud.umami.is">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
        <title>Novo Item - Backlog</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script defer src="https://cloud.umami.is/script.js" data-website-id="7426b8b2-ca40-453e-8cfc-72364e92c02c"></script>
        <link rel="stylesheet" th:href="@{/css/cadastro.css}">
        <link rel="stylesheet" th:href="@{/css/variaveis.css}">
        <!-- PWA -->
        <link rel="manifest" href="/manifest.webmanifest">
        <meta name="theme-color" content="#ff2e63">
        <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon.png">
        <script defer th:src="@{/js/pwa-register.js}"></script>
        <script defer th:src="@{/js/loading-overlay.js}"></script>
    </head>
    <body>

        <h1>📝 Adicionar Novo Item</h1>

        <div class="card" style="display: block;"> <form id="form-cadastro">

            <div class="form-group">
                <label for="titulo">Título:</label>
                <input type="text" id="titulo" placeholder="Ex: God of War" required>
            </div>

            <div class="form-group">
                <label for="tipo">Tipo:</label>
                <select id="tipo" required onchange="atualizarStatusDinamico()">
                    <option value="Jogo">Jogo</option>
                    <option value="Filme">Filme</option>
                    <option value="Série">Série</option>
                </select>
                <small id="dica-tempo-serie" class="dica-tempo" style="display:none;">
                    ⏳ Cálculo de tempo assistido para séries estará disponível em breve!
                </small>
            </div>

            <div class="form-group" id="grupo-duracao-filme" style="display:none;">
                <label for="duracaoMinutos">Duração (em minutos, opcional):</label>
                <input type="number" id="duracaoMinutos" name="duracaoMinutos" min="0" step="1" placeholder="Ex: 120">
                <small class="dica-tempo">🎬 Usado para calcular seu tempo investido no dashboard (ex: 120 = 2h).</small>
            </div>

            <div class="form-group" id="grupo-minutos-jogados" style="display:none;">
                <label for="minutosJogados">Minutos jogados (opcional):</label>
                <input type="number" id="minutosJogados" name="minutosJogados" min="0" step="1" placeholder="Ex: 1500">
                <small class="dica-tempo">🎮 Usado para calcular seu tempo investido no dashboard.</small>
            </div>


            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" required>
                    <option id="opt-concluido" value="Zerado">Zerado / Assistido</option>
                    <option id="opt-andamento" value="Jogando">Jogando / Assistindo</option>
                    <option value="Dropado">Desisti (Dropado)</option>
                    <option value="Backlog">Na fila (Backlog)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imagemUrl">Link da Imagem (URL):</label>

                <div class="busca-capa-group">
                    <input type="text" id="imagemUrl" name="imagemUrl" placeholder="Cole o link ou busque 👉" onchange="atualizarPreview()">

                    <button type="button" id="btn-busca-capa" class="btn-busca-capa" title="Buscar capa na internet">
                        🔍
                    </button>
                </div>

                <img id="preview-img" src="" alt="Prévia" style="display:none; margin-top:10px; max-width: 100px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            </div>

            <div class="form-group">
                <label for="nota">Nota:</label>

                <div id="rating-wrapper" style="display: flex; align-items: center; gap: 10px;">
                    <input type="number" id="nota" name="nota" min="0" max="10" step="0.5" value="0" placeholder="Ex: 9.5" class="form-control">

                    <div id="interactive-stars" class="interactive-stars" style="display: none;"></div>

                    <span id="star-rating-text" style="display: none; font-weight: bold; color: #fbbf24; font-size: 1.2rem;">0/10</span>
                </div>
            </div>

            <div class="form-group">
                <label for="resenha">Resenha rápida:</label>
                <textarea id="resenha" rows="3" maxlength="255" placeholder="O que achou da experiência?"></textarea>
                <div id="contador-caracteres">
                    <span id="char-count">0</span> / 255
                </div>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-salvar">Salvar Item</button>
                <a href="/home" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
        </div>

        <div id="modalCapas" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🎬 Escolha a Capa</h3>
                    <button class="close-modal">✖</button>
                </div>

                <div class="search-box-modal">
                    <input type="text" id="buscaCapaInput" placeholder="Digite o nome do filme/série...">
                    <button type="button" onclick="buscarCapaApi()" style="width: auto;">Buscar</button>
                </div>

                <div id="resultadosCapas" class="grid-capas">
                    <p style="color: #666; grid-column: 1/-1; text-align: center;">Os resultados aparecerão aqui...</p>
                </div>
            </div>
        </div>

        <script th:src="@{/js/script.js}"></script>
        <script th:src="@{/js/theme-toggle.js}"></script>
    </body>
</html>
