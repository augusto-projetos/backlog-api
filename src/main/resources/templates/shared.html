<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://cloud.umami.is">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title th:text="'Coleção de ' + ${apelido}">Coleção Compartilhada</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
        <script defer src="https://cloud.umami.is/script.js" data-website-id="7426b8b2-ca40-453e-8cfc-72364e92c02c"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="stylesheet" th:href="@{/css/variaveis.css}">
        <link rel="stylesheet" th:href="@{/css/conquistas.css}">
        <!-- PWA -->
        <link rel="manifest" href="/manifest.webmanifest">
        <meta name="theme-color" content="#ff2e63">
        <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon.png">
        <script defer th:src="@{/js/pwa-register.js}"></script>
        <script defer th:src="@{/js/loading-overlay.js}"></script>
        <style>
            /* Ajuste para esconder botões de edição caso vazem */
            .card-actions .btn-group { display: none !important; }
        </style>
    </head>
    <body>

        <header class="app-header">
            <div class="header-info">
                <h2>Meu Backlog 🎮</h2>
                <p class="user-greeting">
                    Coleção de <span class="user-name" th:text="${apelido}">Alguém</span>
                </p>
            </div>

            <div class="header-actions">
                <a href="/home" class="btn-theme" title="Voltar para o meu Backlog" style="text-decoration:none; display:inline-flex; align-items:center; gap:6px; padding: 0 12px; width:auto;">
                    <span aria-hidden="true">⬅</span>
                    <span style="font-size:0.85rem;">Meu Backlog</span>
                </a>

                <div class="toggles-group">
                    <button id="theme-toggle" class="btn-theme" title="Alternar Modo Escuro/Claro">
                        <span id="theme-icon">🌙</span>
                    </button>

                    <button id="rating-toggle" class="btn-theme" title="Alternar para Estrelas">
                        <span id="rating-icon">⭐</span>
                    </button>
                </div>
            </div>
        </header>

        <main>

            <!-- --- Seção de Conquistas do Perfil Público --- -->
            <div th:if="${conquistas != null and not conquistas.isEmpty()}" class="conquistas-publico-section">
                <div class="conquistas-publico-header">
                    <h3>🏆 Conquistas</h3>
                    <span class="xp-nivel-badge">
                        Nível <strong th:text="${nivel}">1</strong>
                        &nbsp;·&nbsp;
                        <span th:text="${xpTotal} + ' XP'">0 XP</span>
                    </span>
                </div>
                <div class="xp-bar-track" style="margin-bottom: 16px;">
                    <div class="xp-bar-fill" th:style="'width:' + ${progresso} + '%'"></div>
                </div>
                <div class="conquistas-grid conquistas-grid-publico">
                    <div class="conquista-badge" th:each="uc : ${conquistas}">
                        <span class="conquista-badge-icone" th:text="${uc.conquista.icone}">🏅</span>
                        <div class="conquista-badge-info">
                            <strong th:text="${uc.conquista.nome}">Nome</strong>
                            <small th:text="${uc.conquista.descricao}">Descrição</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls-wrapper">

                <button id="btn-filtros-toggle" class="btn-filtros-toggle">
                    <span>🔍 Filtros e Busca</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

                <div id="filter-menu" class="filter-menu">
                    <div class="filter-group">
                        <label>Tipo:</label>
                        <select id="filter-type">
                            <option value="todos">🌪️ Todos</option>
                            <option value="Jogo">🎮 Jogos</option>
                            <option value="Filme">🎬 Filmes</option>
                            <option value="Série">📺 Séries</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Status:</label>
                        <select id="filter-status" title="Filtrar por status">
                            <option value="todos">🌪️ Todos</option>
                            <option value="andamento">▶️ Jogando / Assistindo</option>
                            <option value="concluido">✅ Zerado / Assistido</option>
                            <option value="backlog">📅 Backlog</option>
                            <option value="dropado">❌ Dropado</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Ordem:</label>
                        <select id="filter-order">
                            <option value="padrao">🔃 Nome (A-Z)</option>
                            <option value="maior">⭐ Maior Nota</option>
                            <option value="menor">👎 Menor Nota</option>
                        </select>
                    </div>

                    <div class="search-container">
                        <input type="text" id="search-bar" placeholder="Pesquisar por nome...">
                    </div>

                    <button id="btn-limpar-filtros" class="btn-limpar">
                        🧹 Limpar Filtros
                    </button>
                </div>
            </div>

            <div id="msg-nao-encontrado" style="display: none; text-align: center; color: #7f8c8d; margin-top: 20px;">
                <p style="font-size: 2rem; margin: 0;">😕</p>
                <p>Nenhum item encontrado.</p>
            </div>

            <div id="lista-itens">

                <div class="card" th:each="item : ${itens}">
                    <div class="card-img-wrapper">
                        <img th:src="${item.imagemUrl != null && item.imagemUrl != '' ? item.imagemUrl : 'https://placehold.co/150x200?text=Sem+Capa'}" alt="Capa">
                    </div>

                    <div class="card-info">
                        <h3>
                            <span th:text="${item.titulo}">Título</span>
                            <span class="badge" th:text="${item.tipo}">Tipo</span>
                        </h3>

                        <div class="resenha-wrapper">
                            <p class="resenha-texto" th:id="'resenha-' + ${item.id}" th:text="${item.resenha} ?: 'Sem resenha.'"></p>
                            <button class="btn-ver-mais" th:id="'btn-ver-' + ${item.id}" th:onclick="'alternarResenha(' + ${item.id} + ')'">... Ver mais</button>
                        </div>

                        <small>Status: <span th:text="${item.status}">Status</span></small>
                    </div>

                    <div class="card-actions">
                        <div class="nota" th:data-nota="${item.nota}">
                            Nota: <span th:text="${item.nota}">10</span>/10
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(itens)}" style="text-align: center; width: 100%; color: #7f8c8d;">
                    <h3>Essa coleção ainda está vazia! 🕸️</h3>
                </div>
            </div>

            <button id="btn-topo" title="Voltar ao topo">⬆</button>
        </main>

        <div th:replace="~{home :: footer}"></div>

        <script th:src="@{/js/script.js}"></script>
        <script th:src="@{/js/search-scroll.js}"></script>
        <script th:src="@{/js/theme-toggle.js}"></script>
        <script th:src="@{/js/rating-toggle.js}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if(typeof verificarTamanhoResenhas === 'function') verificarTamanhoResenhas();
            });
        </script>
    </body>
</html>
