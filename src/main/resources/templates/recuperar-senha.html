<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://cloud.umami.is">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recuperar Senha - Meus Backlog</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔑</text></svg>">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" th:href="@{/css/auth.css}">
        <!-- PWA -->
        <link rel="manifest" href="/manifest.webmanifest">
        <meta name="theme-color" content="#ff2e63">
        <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon.png">
        <script defer th:src="@{/js/pwa-register.js}"></script>
    </head>

    <body>

        <div class="card">
            <h2>Recuperar Senha 🔑</h2>

            <p style="text-align: center; margin-bottom: 20px; font-size: 14px; color: #ccc;">
                Digite seu e-mail cadastrado. Enviaremos um link de recuperação.
            </p>

            <form th:action="@{/recuperar-senha}" method="post">
                <input type="email" name="email" placeholder="Seu e-mail" required>
                <button type="submit">Enviar link de recuperação</button>
            </form>

            <br>
            <a href="/login"><i class="fa-solid fa-arrow-left"></i> Voltar para o Login</a>
        </div>

    </body>
</html>
